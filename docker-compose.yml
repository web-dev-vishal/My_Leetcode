name: leetcode-backend-api

services:
  redis:
    image: redis:7-alpine
    container_name: leetcode-redis
    command: redis-server --requirepass redispass123 --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - leetcode-network
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "redispass123", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: leetcode-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: admin
      RABBITMQ_DEFAULT_PASS: rabbitmqpass123
      RABBITMQ_DEFAULT_VHOST: /
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - leetcode-network
    healthcheck:
      test: rabbitmq-diagnostics -q ping
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: leetcode-app
    environment:
      NODE_ENV: production
      PORT: 8080
      MONGODB_URI: mongodb://host.docker.internal:27017/leetcode
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: redispass123
      RABBITMQ_URL: amqp://admin:rabbitmqpass123@rabbitmq:5672
      JWT_SECRET: 33dc7f503c5d51075a75333a86bec8ad83038b7c5a957356b72ded207697315c
      RAPIDAPI_KEY: 8f8c4db865msh020ffd097deb5f0p1d129ajsne4ac3f4df319
      RAPIDAPI_HOST: judge0-ce.p.rapidapi.com
      JUDGE0_API_URL: https://judge0-ce.p.rapidapi.com
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
      OPENROUTER_BASE_URL: https://openrouter.ai/api/v1
      OPENROUTER_MODEL: anthropic/claude-3.5-sonnet
      OPENROUTER_TIMEOUT: 30000
      APP_URL: http://localhost:8080
    ports:
      - "8080:8080"
    depends_on:
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - leetcode-network
    restart: unless-stopped

  worker:
    build: .
    command: node src/workers/index.js
    environment:
      NODE_ENV: production
      MONGODB_URI: mongodb://host.docker.internal:27017/leetcode
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: redispass123
      RABBITMQ_URL: amqp://admin:rabbitmqpass123@rabbitmq:5672
      RAPIDAPI_KEY: 8f8c4db865msh020ffd097deb5f0p1d129ajsne4ac3f4df319
      RAPIDAPI_HOST: judge0-ce.p.rapidapi.com
      JUDGE0_API_URL: https://judge0-ce.p.rapidapi.com
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
      OPENROUTER_BASE_URL: https://openrouter.ai/api/v1
      OPENROUTER_MODEL: anthropic/claude-3.5-sonnet
    depends_on:
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - leetcode-network
    restart: unless-stopped
    deploy:
      replicas: 2

networks:
  leetcode-network:

volumes:
  redis_data:
  rabbitmq_data:
