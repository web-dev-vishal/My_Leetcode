name: leetcode-backend-api

services:
  db:
    image: mongo:latest
    container_name: leetcode-mongodb
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: admin
      MONGO_INITDB_DATABASE: leetcode
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - leetcode-network
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/leetcode --quiet
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: leetcode-app
    environment:
      PORT: 8080
      MONGODB_URI: mongodb://admin:admin@db:27017/leetcode?authSource=admin
      JWT_SECRET: 33dc7f503c5d51075a75333a86bec8ad83038b7c5a957356b72ded207697315c
      RAPIDAPI_KEY: 8f8c4db865msh020ffd097deb5f0p1d129ajsne4ac3f4df319
      RAPIDAPI_HOST: judge0-ce.p.rapidapi.com
      JUDGE0_API_URL: https://judge0-ce.p.rapidapi.com
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - leetcode-network
    restart: unless-stopped

networks:
  leetcode-network:

volumes:
  mongodb_data:
